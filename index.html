<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmersedPrivacy — arXiv Preprint</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans:wght@700;800&display=swap" rel="stylesheet">

  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

<!-- Hero -->
<section class="hero-section">
  <div class="container narrow">
    <span class="venue-badge" id="venue"></span>
    <h1 class="paper-title" id="paper-title"></h1>
    <p class="author-list" id="authors"></p>
    <p class="affiliation-list" id="affiliations"></p>
    <p class="email-list" id="emails"></p>
    <div class="link-buttons">
      <a id="link-paper" class="button is-rounded is-medium" href="#">
        <span class="icon"><i class="fas fa-file-pdf"></i></span><span>Paper</span>
      </a>
      <a id="link-arxiv" class="button is-rounded is-medium" href="#">
        <span class="icon"><i class="fas fa-book"></i></span><span>arXiv</span>
      </a>
      <a id="link-code" class="button is-rounded is-medium" href="#">
        <span class="icon"><i class="fab fa-github"></i></span><span>Code</span>
      </a>
    </div>
  </div>
</section>

<!-- Teaser -->
<section class="section teaser-section">
  <div class="container narrow">
    <figure class="teaser-figure">
      <img src="static/figures/teaser_beta_01.png" alt="ImmersedPrivacy Framework Overview">
      <figcaption id="teaser-caption"></figcaption>
    </figure>
  </div>
</section>

<!-- Abstract -->
<section class="section alt-bg">
  <div class="container narrow">
    <h2 class="section-heading">Abstract</h2>
    <div id="abstract-md"></div>
  </div>
</section>

<!-- Method -->
<section class="section">
  <div class="container narrow">
    <h2 class="section-heading">Method</h2>
    <div id="method-md"></div>
  </div>
</section>

<!-- Results -->
<section class="section alt-bg">
  <div class="container narrow">
    <h2 class="section-heading">Key Findings</h2>
    <div id="results-md"></div>
  </div>
</section>

<!-- Additional Analysis -->
<section class="section">
  <div class="container narrow">
    <h2 class="section-heading">Additional Analysis</h2>
    <div id="analysis-md"></div>
  </div>
</section>

<!-- Citation -->
<section class="section alt-bg">
  <div class="container narrow">
    <h2 class="section-heading">Citation</h2>
    <div id="citation-md"></div>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <div class="container narrow has-text-centered">
    <p id="footer-text"></p>
  </div>
</footer>

<script src="static/js/js-yaml.min.js"></script>
<script src="static/js/marked.min.js"></script>
<script src="static/js/main.js"></script>

</body>
</html>
