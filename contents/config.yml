teaser-caption: "Overview of <strong>ImmersedPrivacy</strong>. Our evaluation uses image, video, and audio modalities to simulate how VLMs perceive physical environments, social states, and observation histories. It is organized into three progressive tiers: Perceptual Sensitivity Grounding, Dynamic Socio-Contextual Adaptation, and History-Conditioned Inference."
